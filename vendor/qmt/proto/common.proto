  QUOTE_PERIOD_TICK = 1;
  QUOTE_PERIOD_1M = 2;
  QUOTE_PERIOD_5M = 3;
  QUOTE_PERIOD_15M = 4;
  QUOTE_PERIOD_30M = 5;
  QUOTE_PERIOD_1H = 6;
  QUOTE_PERIOD_1D = 7;
  QUOTE_PERIOD_1W = 8;
  QUOTE_PERIOD_1MON = 9;
  QUOTE_PERIOD_1Q = 10;
  QUOTE_PERIOD_1HY = 11;
  QUOTE_PERIOD_1Y = 12;
}

