services:
  axum:
    build:
      context: .
      dockerfile: Dockerfile
    image: rstock:latest
    container_name: rstock-axum
    restart: unless-stopped
    ports:
      - "${RStock_PORT:-8080}:8080"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./temp:/app/temp
      - ./data:/app/data
      - ./meta:/app/meta
    environment:
      RUST_LOG: info,rstock=info,rstock_jobs=info
