[server]
bind = "0.0.0.0:8080"
daily_cron = "0 30 15 * * *"
minute_cron = "0 10 15 * * *"
quote_forwarder_enabled = true

[qmt]
host = "http://127.0.0.1:40002"
authorization = ""
timeout = 30

[nats]
url = "nats://127.0.0.1:4222"
token = ""

[s3]
host = "127.0.0.1:9000"
bucket = "stock"
region = "us-east-1"
access_key = ""
secret_key = ""
local_staging_dir = "temp/staging"

[sync.daily]
chunk_size = 200
fetch_concurrency = 8

[sync.minute]
chunk_size = 100
fetch_concurrency = 4

[patterns]
adjust_type = "qfq"
tdx_fallback = true

[feishu]
bot_token = ""

[tools.minute_s3]
part_size = 200000
upload_concurrency = 4
manifest_file = "meta/ingestion/minute_zip_manifest.txt"
